apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonLabels:
  environment: production

patches:
  - path: deployment-patch.yaml
  - path: hpa-patch.yaml
  - path: ingress-patch.yaml

configMapGenerator:
  - name: weather-service-config
    namespace: maxweather
    literals:
      - APP_ENV=production
      - VALKEY_HOST=PRODUCTION_VALKEY_HOST
      - VALKEY_PORT=6379
      - VALKEY_TTL=600
      - DB_HOST=PRODUCTION_AURORA_HOST
      - DB_PORT=5432
      - DB_NAME=maxweather
