apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service
  namespace: maxweather
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: weather-service
          image: weather-service:kind-test
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
